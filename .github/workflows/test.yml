name: JDE E1 Test Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - login
          - supplier-ledger
          - backorder

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run tests
      env:
        JDE_BASE_URL: ${{ secrets.JDE_BASE_URL }}
        JDE_USER: ${{ secrets.JDE_USER }}
        JDE_PASS: ${{ secrets.JDE_PASS }}
      run: |
        if [ "${{ github.event.inputs.test_suite }}" = "all" ] || [ -z "${{ github.event.inputs.test_suite }}" ]; then
          ./orchestrator.sh samples/jde-demo-requirement.json
        else
          echo "Running specific test suite: ${{ github.event.inputs.test_suite }}"
        fi
      continue-on-error: true
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results/
          pipeline/runs/
        retention-days: 30
        
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
        
    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = 'pipeline/runs/*/4-execution.json';
          
          // Simple test summary
          const summary = `## Test Execution Summary\n\n- Status: ${process.env.TEST_STATUS || 'Unknown'}\n- See artifacts for detailed results`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });

  update-jira:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Update Jira with results
      env:
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        JIRA_USER: ${{ secrets.JIRA_USER }}
      run: |
        echo "Updating Jira with test results..."
        # Add Jira update script here
        echo "Test execution completed"